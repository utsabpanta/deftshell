name: Nightly

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  nightly-build:
    name: Nightly Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Upload nightly binary
        uses: actions/upload-artifact@v4
        with:
          name: ds-nightly-${{ matrix.os }}
          path: target/release/ds

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Benchmark startup time
        run: |
          echo "Measuring startup time..."
          for i in $(seq 1 10); do
            /usr/bin/time -f "%e" ./target/release/ds version 2>&1 | tail -1
          done

      - name: Benchmark context detection
        run: |
          echo "Measuring context detection..."
          for i in $(seq 1 10); do
            /usr/bin/time -f "%e" ./target/release/ds context --detect --quiet 2>&1 | tail -1
          done

      - name: Binary size
        run: |
          ls -lh target/release/ds
          size target/release/ds || true
